<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>exchanges</title>
    <link rel="stylesheet" href="styles.css?v=20260410-2" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <main class="wrap">
      <h1>Exchange Tracker</h1>
      <div class="status-banner" id="status-banner" hidden></div>
      <div class="meta">
        <p class="meta-line" id="meta-published">고시: 로딩 중...</p>
        <p class="meta-line" id="meta-collected">수집: 로딩 중...</p>
        <p class="meta-line" id="meta-status">수집 상태: 로딩 중...</p>
      </div>

      <section class="controls">
        <label for="currency">통화</label>
        <select id="currency"></select>
        <div class="quick">
          <button data-code="USD">USD</button>
          <button data-code="JPY">JPY</button>
          <button data-code="CNY">CNY</button>
          <button data-code="EUR">EUR</button>
        </div>
        <div class="periods" id="periods">
          <button data-period="1d" class="active" type="button">1일</button>
          <button data-period="7d" type="button">1주</button>
          <button data-period="30d" type="button">1개월</button>
        </div>
      </section>

      <section class="cards" id="cards">
        <button class="card card-main" id="base-toggle" aria-expanded="false" aria-controls="extra-cards" type="button">
          <span>매매기준율</span>
          <strong id="base">-</strong>
        </button>
        <div class="extra-cards" id="extra-cards">
          <div class="card"><span>송금 보낼때</span><strong id="send">-</strong></div>
          <div class="card"><span>송금 받을때</span><strong id="receive">-</strong></div>
        </div>
      </section>

      <section class="chart">
        <canvas id="chart"></canvas>
      </section>
    </main>
    <script src="app.js?v=20260413-1"></script>
  </body>
</html>
