name: chain-keeper

on:
  workflow_dispatch:
    inputs:
      monitor_minutes:
        description: 'How long to keep monitoring in this run'
        required: false
        default: '330'
        type: string
      stale_limit_seconds:
        description: 'Stop if the repo status is stale beyond this many seconds'
        required: false
        default: '1800'
        type: string

permissions:
  actions: write
  contents: read

concurrency:
  group: exchanges-chain-keeper
  cancel-in-progress: false

jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Monitor and restart exchange chain
        env:
          GH_TOKEN: ${{ github.token }}
          MONITOR_MINUTES: ${{ inputs.monitor_minutes || '330' }}
          STALE_LIMIT_SECONDS: ${{ inputs.stale_limit_seconds || '1800' }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import time
          from datetime import datetime, timezone
          from pathlib import Path

          monitor_minutes = int(os.environ.get('MONITOR_MINUTES', '330'))
          stale_limit_seconds = int(os.environ.get('STALE_LIMIT_SECONDS', '1800'))
          deadline = time.time() + monitor_minutes * 60

          def read_status():
              path = Path('data/status.json')
              if not path.exists():
                  return {}
              return json.loads(path.read_text(encoding='utf-8'))

          def git_refresh():
              subprocess.run(['git', 'fetch', 'origin', 'main'], check=True, capture_output=True, text=True)
              subprocess.run(['git', 'checkout', '--force', 'origin/main', '--', 'data/status.json'], check=False)

          def list_runs():
              out = subprocess.check_output([
                  'gh', 'run', 'list',
                  '--repo', '0707soo/exchanges',
                  '--workflow', 'rates-burst-sync.yml',
                  '--limit', '10',
                  '--json', 'databaseId,status,conclusion,createdAt,event'
              ], text=True)
              return json.loads(out)

          def any_active(runs):
              return any(run.get('status') in ('queued', 'in_progress') for run in runs)

          while time.time() < deadline:
              git_refresh()
              status = read_status()
              runs = list_runs()
              active = any_active(runs)
              now = datetime.now(timezone.utc)
              ended = status.get('window_ended_at_utc')
              stale = True
              if ended:
                  ended_dt = datetime.fromisoformat(ended)
                  stale = (now - ended_dt).total_seconds() > stale_limit_seconds

              delay = int(status.get('next_delay_seconds') or 120)
              should_dispatch = stale or not active

              if should_dispatch and not active:
                  print(json.dumps({
                      'action': 'dispatch',
                      'reason': 'stale-status' if stale else 'no-active-run',
                      'delay': delay,
                      'status': status,
                  }, ensure_ascii=False))
                  subprocess.run([
                      'gh', 'workflow', 'run', 'rates-burst-sync.yml',
                      '--repo', '0707soo/exchanges',
                      '-f', 'continue_chain=true',
                      '-f', 'trigger_reason=chain-keeper'
                  ], check=True)
                  time.sleep(15)
              else:
                  print(json.dumps({
                      'action': 'wait-active' if active else 'wait',
                      'reason': 'stale-but-run-active' if stale and active else 'healthy',
                      'delay': delay,
                  }, ensure_ascii=False))

              sleep_for = 30 if stale else max(30, min(delay, 300))
              time.sleep(sleep_for)

          print(json.dumps({'action': 'done'}, ensure_ascii=False))
          PY